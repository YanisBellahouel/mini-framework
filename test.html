<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8" /><title>Test Events</title></head>
<body>
  <button id="btn1">Clique moi</button>
  <button id="btn2">Clique moi aussi</button>
  <p id="output">En attente...</p>

  <script type="module">
    import { on, off, emit } from './framework/events.js'

    // Test 1 : écouter un clic sur btn1
    function handleClick(e) {
      document.getElementById('output').textContent = '✅ Clic détecté sur : ' + e.target.id
      console.log('✅ Test 1 OK : on() fonctionne')
    }
    on('click', '#btn1', handleClick)

    // Test 2 : écouter un clic sur btn2 puis le désactiver
    on('click', '#btn2', (e) => {
      console.log('✅ Test 2 OK : deuxième listener fonctionne')
    })

    // Test 3 : emit() — déclencher un événement custom
    on('monEvenement', 'body', (e) => {
      console.log('✅ Test 3 OK : emit() fonctionne, payload reçu :', e.detail)
    })
    emit('monEvenement', { message: 'Bonjour depuis emit !' })

  </script>
</body>
</html>
